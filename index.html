<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#008751" />
    <title>ProfitPadi</title>
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />

    <!-- Telegram WebApp SDK — REQUIRED for Mini App to work -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <!-- Prevent flash of wrong theme -->
    <script>
      document.documentElement.style.setProperty('--tg-theme-bg-color',
        window.Telegram?.WebApp?.backgroundColor || '#ffffff');
    </script>

    <style>
      html, body { margin: 0; padding: 0; background: var(--tg-theme-bg-color, #fff); }
      #root { min-height: 100vh; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
